<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>New Roots Solution — Fleet Management</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
<style>
  :root{
    --nr-dark:#3D2B1F;--nr-brown:#6B4C38;--nr-teal:#2D7A6B;--nr-teal-mid:#3D9E8C;
    --nr-teal-light:#E0F2EE;--nr-teal-pale:#F0FAF8;--nr-linen:#F0EDE6;
    --nr-linen-mid:#E2DDD5;--nr-text:#1A1A1A;--nr-muted:#6B7280;
    --radius:10px;--radius-sm:6px;--radius-full:999px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:'Inter',sans-serif;color:var(--nr-text);background:#fff;line-height:1.5}
  body.sc{font-family:'Noto Sans SC',sans-serif}
  body.tc{font-family:'Noto Sans TC',sans-serif}
  a{text-decoration:none;color:inherit}

  /* LANG TOGGLE */
  .lang-switcher{display:flex;align-items:center;gap:2px;background:var(--nr-linen);border-radius:var(--radius-full);padding:3px;border:1px solid var(--nr-linen-mid)}
  .lang-btn{padding:4px 12px;border-radius:var(--radius-full);font-size:12px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--nr-muted);font-family:inherit;transition:all .15s;display:flex;align-items:center;gap:5px}
  .lang-btn.active{background:#fff;color:var(--nr-dark);box-shadow:0 1px 3px rgba(0,0,0,.1)}
  .lang-btn span{font-size:14px}
  .script-sub{display:flex;gap:4px;margin-left:4px}
  .script-btn{padding:3px 8px;border-radius:var(--radius-full);font-size:11px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--nr-muted);font-family:inherit;transition:all .15s}
  .script-btn.active{background:var(--nr-teal-light);color:var(--nr-teal)}
  .lang-divider{width:1px;height:20px;background:var(--nr-linen-mid);margin:0 4px}

  /* NAV */
  nav{position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid var(--nr-linen-mid);display:flex;align-items:center;justify-content:space-between;padding:14px 48px;gap:16px}
  .logo{display:flex;align-items:center;gap:10px;flex-shrink:0}
  .logo-mark{width:34px;height:34px;border-radius:8px;background:var(--nr-dark);display:flex;align-items:center;justify-content:center}
  .logo-mark i{font-size:18px;color:var(--nr-teal-light)}
  .logo-name .l1{font-size:15px;font-weight:600;color:var(--nr-dark)}
  .logo-name .l2{font-size:12px;color:var(--nr-teal)}
  .nav-links{display:flex;gap:24px}
  .nav-links a{font-size:14px;color:var(--nr-muted);transition:color .15s}
  .nav-links a:hover{color:var(--nr-teal)}
  .nav-right{display:flex;gap:10px;align-items:center;flex-shrink:0}
  .btn{padding:8px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--nr-linen-mid);background:#fff;color:var(--nr-dark);font-family:inherit;transition:all .15s}
  .btn:hover{background:var(--nr-linen)}
  .btn-p{background:var(--nr-teal);color:#fff;border-color:var(--nr-teal)}
  .btn-p:hover{background:var(--nr-teal-mid);border-color:var(--nr-teal-mid)}
  .btn-outline{border-color:var(--nr-teal);color:var(--nr-teal);background:transparent}
  .btn-outline:hover{background:var(--nr-teal-light)}
  .btn-lg{padding:12px 26px;font-size:15px;border-radius:var(--radius)}

  /* HERO */
  .hero{background:var(--nr-linen);padding:80px 48px 64px;display:flex;align-items:center;gap:48px}
  .hero-left{flex:1;max-width:580px}
  .hero-right{flex:1;display:flex;justify-content:center}
  .hero-card{background:#fff;border-radius:16px;padding:28px;border:1px solid var(--nr-linen-mid);max-width:340px;width:100%;box-shadow:0 4px 24px rgba(61,43,31,.08)}
  .eyebrow-pill{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:var(--radius-full);background:var(--nr-teal-light);color:var(--nr-teal);font-size:12px;font-weight:500;margin-bottom:22px;border:1px solid #A8D8D0}
  .hero h1{font-size:38px;font-weight:600;line-height:1.2;color:var(--nr-dark);margin-bottom:16px}
  .hero h1 span{color:var(--nr-teal)}
  .hero p{font-size:16px;color:var(--nr-muted);line-height:1.75;margin-bottom:32px}
  .hero-actions{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:36px}
  .trust-row{display:flex;gap:20px;flex-wrap:wrap}
  .trust-item{display:flex;align-items:center;gap:6px;font-size:13px;color:var(--nr-muted)}
  .trust-item i{color:var(--nr-teal);font-size:16px}
  .hc-label{font-size:11px;font-weight:500;color:var(--nr-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px}
  .hc-stat{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--nr-linen-mid)}
  .hc-stat:last-child{border-bottom:none}
  .hc-icon{width:36px;height:36px;border-radius:8px;background:var(--nr-teal-light);display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .hc-icon i{font-size:18px;color:var(--nr-teal)}
  .hc-val{font-size:18px;font-weight:600;color:var(--nr-dark)}
  .hc-sub{font-size:12px;color:var(--nr-muted)}
  .hc-featured{background:var(--nr-teal-light);border-radius:10px;padding:14px;border:1.5px solid #A8D8D0;margin-bottom:4px}

  /* STATS */
  .stats-bar{display:grid;grid-template-columns:repeat(4,1fr);background:var(--nr-dark)}
  .stat-cell{padding:26px 32px;border-right:1px solid #5A3E30;text-align:center}
  .stat-cell:last-child{border-right:none}
  .stat-num{font-size:28px;font-weight:600;color:#fff;margin-bottom:4px}
  .stat-sub{font-size:13px;color:#A08878}

  /* SECTIONS */
  .section{padding:64px 48px}
  .section.tint{background:var(--nr-linen)}
  .section.teal-tint{background:var(--nr-teal-pale)}
  .sec-eyebrow{font-size:12px;font-weight:600;color:var(--nr-teal);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
  .section h2{font-size:28px;font-weight:600;color:var(--nr-dark);margin-bottom:10px}
  .section-sub{font-size:15px;color:var(--nr-muted);max-width:520px;line-height:1.7;margin-bottom:36px}
  .divider{height:1px;background:var(--nr-linen-mid)}

  /* SERVICES */
  .svc-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .svc{background:#fff;border:1px solid var(--nr-linen-mid);border-radius:var(--radius);padding:24px;transition:border-color .15s,background .15s}
  .svc:hover{border-color:#A8D8D0;background:var(--nr-teal-pale)}
  .svc.core{border:2px solid #A8D8D0}
  .core-badge{display:inline-block;padding:3px 10px;border-radius:var(--radius-full);background:var(--nr-teal-light);color:var(--nr-teal);font-size:11px;font-weight:600;margin-bottom:12px}
  .svc-icon{width:44px;height:44px;border-radius:10px;background:var(--nr-teal-light);display:flex;align-items:center;justify-content:center;margin-bottom:16px}
  .svc-icon i{font-size:22px;color:var(--nr-teal)}
  .svc h3{font-size:15px;font-weight:600;color:var(--nr-dark);margin-bottom:8px}
  .svc p{font-size:13px;color:var(--nr-muted);line-height:1.65}

  /* STEPS */
  .steps-wrap{border:1px solid var(--nr-linen-mid);border-radius:var(--radius);overflow:hidden;background:#fff}
  .steps{display:grid;grid-template-columns:repeat(4,1fr)}
  .step{padding:28px;border-right:1px solid var(--nr-linen-mid)}
  .step:last-child{border-right:none}
  .step-n{width:32px;height:32px;border-radius:50%;background:var(--nr-teal);color:#fff;font-size:14px;font-weight:600;display:flex;align-items:center;justify-content:center;margin-bottom:14px}
  .step h3{font-size:14px;font-weight:600;color:var(--nr-dark);margin-bottom:6px}
  .step p{font-size:13px;color:var(--nr-muted);line-height:1.6}

  /* PRICING */
  .toggle-wrap{display:flex;align-items:center;justify-content:center;gap:14px;padding:28px;border-bottom:1px solid var(--nr-linen-mid);background:#fff}
  .tl{font-size:14px;color:var(--nr-muted);transition:color .15s}
  .tl.on{font-weight:600;color:var(--nr-dark)}
  .toggle-track{width:48px;height:26px;border-radius:999px;background:var(--nr-teal);border:none;cursor:pointer;position:relative;flex-shrink:0}
  .toggle-dot{width:20px;height:20px;border-radius:50%;background:#fff;position:absolute;top:3px;left:3px;transition:left .2s}
  .save-pill{padding:4px 12px;border-radius:var(--radius-full);background:#FEF9C3;color:#92400E;font-size:12px;font-weight:600;border:1px solid #FDE68A}
  .tiers{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:16px}
  .tier{background:#fff;border:1px solid var(--nr-linen-mid);border-radius:var(--radius);padding:26px;position:relative}
  .tier.pop{border:2px solid var(--nr-teal)}
  .pop-ribbon{position:absolute;top:-1px;left:50%;transform:translateX(-50%);background:var(--nr-teal);color:#fff;font-size:11px;font-weight:600;padding:4px 16px;border-radius:0 0 10px 10px;white-space:nowrap}
  .tbadge{display:inline-block;padding:4px 12px;border-radius:var(--radius-full);background:var(--nr-teal-light);color:var(--nr-teal);font-size:11px;font-weight:600;margin-bottom:14px}
  .tier h3{font-size:17px;font-weight:600;color:var(--nr-dark);margin-bottom:4px}
  .tier-who{font-size:13px;color:var(--nr-muted);margin-bottom:16px}
  .price-row{display:flex;align-items:baseline;gap:6px;margin-bottom:4px}
  .price-main{font-size:30px;font-weight:700;color:var(--nr-dark)}
  .price-unit{font-size:14px;color:var(--nr-muted)}
  .price-sub{font-size:12px;color:var(--nr-muted);margin-bottom:4px;min-height:18px}
  .price-maint{display:flex;align-items:center;gap:7px;padding:10px 12px;border-radius:var(--radius-sm);background:var(--nr-teal-light);margin:14px 0 18px;font-size:13px;color:var(--nr-teal);font-weight:500}
  .price-maint i{font-size:16px;flex-shrink:0}
  .price-maint span{color:var(--nr-dark)}
  .price-maint.muted{background:var(--nr-linen);color:var(--nr-brown)}
  .price-maint.muted span{color:var(--nr-dark)}
  .feat-label{font-size:11px;font-weight:600;color:var(--nr-muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px;margin-top:16px}
  .feats{list-style:none;margin-bottom:20px}
  .feats li{font-size:13px;color:var(--nr-muted);padding:5px 0;display:flex;align-items:flex-start;gap:8px;border-bottom:1px solid var(--nr-linen-mid);line-height:1.5}
  .feats li:last-child{border-bottom:none}
  .feats li i{font-size:15px;color:var(--nr-teal);flex-shrink:0;margin-top:1px}
  .feats li i.no{color:#C0A898}
  .feats li.hi{color:var(--nr-teal)}
  .markup-band{background:var(--nr-dark);border-radius:var(--radius);padding:22px 28px;display:flex;align-items:flex-start;gap:18px}
  .markup-band i.big{font-size:30px;color:var(--nr-teal-light);flex-shrink:0;margin-top:2px}
  .markup-band h4{font-size:15px;font-weight:600;color:#fff;margin-bottom:6px}
  .markup-band p{font-size:13px;color:#A08878;line-height:1.65}
  .markup-band strong{color:var(--nr-teal-light)}

  /* MAINTENANCE */
  .maint-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .maint-item{background:#fff;border:1px solid var(--nr-linen-mid);border-radius:var(--radius);padding:20px;display:flex;gap:14px}
  .maint-icon{width:42px;height:42px;border-radius:10px;background:var(--nr-teal-light);display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .maint-icon i{font-size:20px;color:var(--nr-teal)}
  .maint-item h4{font-size:14px;font-weight:600;color:var(--nr-dark);margin-bottom:5px}
  .maint-item p{font-size:13px;color:var(--nr-muted);line-height:1.6}

  /* CALC */
  .calc-wrap{background:#fff;border:1px solid var(--nr-linen-mid);border-radius:var(--radius);padding:28px}
  .calc-wrap h3{font-size:17px;font-weight:600;color:var(--nr-dark);margin-bottom:22px}
  .calc-row{display:flex;align-items:center;gap:16px;margin-bottom:14px}
  .calc-row label{font-size:14px;color:var(--nr-muted);min-width:220px}
  .calc-row input[type=range]{flex:1;accent-color:var(--nr-teal)}
  .calc-row .val{font-size:14px;font-weight:600;color:var(--nr-dark);min-width:80px;text-align:right}
  .calc-results{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-top:24px;padding-top:22px;border-top:1px solid var(--nr-linen-mid)}
  .cr{background:var(--nr-linen);border-radius:var(--radius-sm);padding:16px;text-align:center}
  .cr-num{font-size:22px;font-weight:700;color:var(--nr-teal);margin-bottom:4px}
  .cr-label{font-size:12px;color:var(--nr-muted);line-height:1.4}
  .cr.neg .cr-num{color:#B45309}
  .cr.total{background:var(--nr-dark)}
  .cr.total .cr-num{color:#fff}
  .cr.total .cr-label{color:#A08878}

  /* REVIEWS */
  .reviews{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
  .rev{background:#fff;border:1px solid var(--nr-linen-mid);border-radius:var(--radius);padding:22px}
  .rev-stars{color:var(--nr-teal);font-size:16px;margin-bottom:12px}
  .rev-q{font-size:14px;color:var(--nr-muted);line-height:1.7;margin-bottom:18px;font-style:italic}
  .rev-author{display:flex;align-items:center;gap:10px}
  .av{width:36px;height:36px;border-radius:50%;background:var(--nr-teal-light);color:var(--nr-teal);font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
  .av-name{font-size:13px;font-weight:600;color:var(--nr-dark)}
  .av-role{font-size:12px;color:var(--nr-muted)}

  /* FAQ */
  .faq-item{border-bottom:1px solid var(--nr-linen-mid);padding:20px 0;cursor:pointer}
  .faq-item:first-child{border-top:1px solid var(--nr-linen-mid)}
  .faq-q{font-size:15px;font-weight:500;color:var(--nr-dark);display:flex;align-items:center;justify-content:space-between;gap:12px}
  .faq-q i{font-size:18px;color:var(--nr-teal);transition:transform .2s;flex-shrink:0}
  .faq-a{font-size:14px;color:var(--nr-muted);line-height:1.75;margin-top:10px;display:none;max-width:640px}
  .faq-item.open .faq-a{display:block}
  .faq-item.open .faq-q i{transform:rotate(45deg)}

  /* CTA */
  .cta-band{background:var(--nr-dark);padding:64px 48px;display:flex;align-items:center;justify-content:space-between;gap:32px}
  .cta-band h2{font-size:28px;font-weight:600;color:#fff;margin-bottom:10px}
  .cta-band p{font-size:15px;color:#A08878;line-height:1.7;max-width:460px}
  .cta-btns{display:flex;gap:12px;flex-shrink:0}
  .btn-cta{background:var(--nr-teal);color:#fff;border:none;padding:13px 26px;border-radius:var(--radius);font-size:15px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit;transition:background .15s}
  .btn-cta:hover{background:var(--nr-teal-mid)}
  .btn-ghost{background:transparent;color:#C4B5AC;border:1px solid #5A3E30;padding:13px 26px;border-radius:var(--radius);font-size:15px;font-weight:500;cursor:pointer;white-space:nowrap;font-family:inherit;transition:all .15s}
  .btn-ghost:hover{background:#5A3E30;color:#fff}

  /* FOOTER */
  footer{background:var(--nr-linen);border-top:1px solid var(--nr-linen-mid);padding:48px 48px 0}
  .footer-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:32px;padding-bottom:40px}
  .footer-brand p{font-size:13px;color:var(--nr-muted);margin-top:12px;line-height:1.7;max-width:220px}
  .footer-col h4{font-size:13px;font-weight:600;color:var(--nr-dark);margin-bottom:14px}
  .footer-col a{display:block;font-size:13px;color:var(--nr-muted);margin-bottom:8px;transition:color .15s}
  .footer-col a:hover{color:var(--nr-teal)}
  .footer-bottom{border-top:1px solid var(--nr-linen-mid);padding:18px 0;display:flex;justify-content:space-between;font-size:12px;color:var(--nr-muted)}

  @media(max-width:900px){
    nav{padding:14px 20px}.nav-links{display:none}
    .hero{flex-direction:column;padding:40px 20px}.hero-right{display:none}
    .stats-bar,.steps,.tiers,.svc-grid,.maint-grid,.reviews,.calc-results{grid-template-columns:1fr}
    .section{padding:40px 20px}
    .footer-grid{grid-template-columns:1fr 1fr}
    .cta-band{flex-direction:column;padding:40px 20px;text-align:center}
    .cta-btns{justify-content:center}
  }
</style>
</head>
<body>

let currentLang = 'en';
let currentScript = 'sc'; // sc = simplified, tc = traditional
let billingAnnual = false;

function getLang(){ return currentLang === 'en' ? CONTENT.en : (currentScript === 'tc' ? CONTENT.tc : CONTENT.sc); }

function setLang(lang){
  currentLang = lang;
  document.getElementById('btn-en').classList.toggle('active', lang==='en');
  document.getElementById('btn-zh').classList.toggle('active', lang==='zh');
  document.getElementById('script-sub').style.display = lang==='zh'?'flex':'none';
  document.body.className = lang==='en' ? '' : (currentScript==='tc'?'tc':'sc');
  render();
}

function setScript(s){
  currentScript = s;
  document.getElementById('btn-sc').classList.toggle('active', s==='sc');
  document.getElementById('btn-tc').classList.toggle('active', s==='tc');
  document.body.className = s==='tc'?'tc':'sc';
  render();
}

  // pricing

  document.getElementById('pricing-h2').textContent = d.pricing.h2;
  document.getElementById('pricing-sub').textContent = d.pricing.sub;

function renderTiers(d){
  document.getElementById('tiers').innerHTML = d.pricing.tiers.map(t=>`
    <div class="tier${t.pop?' pop':''}">
      ${t.pop?`<div class="pop-ribbon">${t.ribbon}</div>`:''}

      <h3>${t.name}</h3>
      <div class="tier-who">${t.who}</div>
      <div class="price-row"><span class="price-main">${t.price}</span>${t.unit?`<span class="price-unit">${t.unit}</span>`:''}</div>
      <div class="price-sub">${billingAnnual && t.price==='30%' ? (currentLang==='en'?'Annual billing — ~8% savings on coord. fee':t.sub.replace('69','63')) : t.sub}</div>
      <div class="price-maint${t.maintMuted?' muted':''}"><i class="ti ti-${t.maintMuted?'tool':'shield-check'}"></i>${t.maintLabel}<span>${t.maintVal}</span></div>
      ${t.sections.map(sec=>`
        <div class="feat-label">${sec.label}</div>
        <ul class="feats">${sec.items.map(li=>`<li class="${sec.hi?'hi':''}"><i class="ti ${li.icon}"></i>${li.text}</li>`).join('')}</ul>
      `).join('')}
      <button class="btn${t.pop?' btn-p':''} btn-lg" style="width:100%">${t.cta}</button>
    </div>`).join('');
}

function toggleBilling(){
  billingAnnual = !billingAnnual;
  const dot = document.getElementById('tdot');
  dot.style.left = billingAnnual?'25px':'3px';
  document.getElementById('lbl-mo').classList.toggle('on',!billingAnnual);
  document.getElementById('lbl-yr').classList.toggle('on',billingAnnual);
  renderTiers(getLang());
}

function calc(){
  const v=+document.getElementById('c-v').value;
  const r=+document.getElementById('c-r').value;
  const m=+document.getElementById('c-m').value;
  document.getElementById('o-v').textContent=v;
  document.getElementById('o-r').textContent='$'+r.toLocaleString();
  document.getElementById('o-m').textContent='$'+m;
  const gross=v*r, mgmt=Math.round(gross*0.30), coord=v*69, maintCost=v*m, net=gross-mgmt-coord-maintCost;
  document.getElementById('r-gross').textContent='$'+gross.toLocaleString();
  document.getElementById('r-mgmt').textContent='−$'+mgmt.toLocaleString();
  document.getElementById('r-coord').textContent='−$'+coord.toLocaleString();
  document.getElementById('r-net').textContent='$'+Math.max(0,net).toLocaleString();
}

function toggleFaq(el){
  const wasOpen=el.classList.contains('open');
  document.querySelectorAll('.faq-item').forEach(f=>f.classList.remove('open'));
  if(!wasOpen)el.classList.add('open');
}
