<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Marketplace — New Roots Solution</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css"/>
<style>
  :root{
    --nr-dark:#3D2B1F;--nr-brown:#6B4C38;--nr-teal:#2D7A6B;--nr-teal-mid:#3D9E8C;
    --nr-teal-light:#E0F2EE;--nr-teal-pale:#F0FAF8;--nr-linen:#F0EDE6;
    --nr-linen-mid:#E2DDD5;--nr-text:#1A1A1A;--nr-muted:#6B7280;
    --radius:10px;--radius-sm:6px;--radius-full:999px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{font-family:'Inter',sans-serif;color:var(--nr-text);background:#fff;line-height:1.5}
  body.sc{font-family:'Noto Sans SC',sans-serif}
  body.tc{font-family:'Noto Sans TC',sans-serif}
  a{text-decoration:none;color:inherit}

  /* NAV */
  nav{position:sticky;top:0;z-index:100;background:#fff;border-bottom:1px solid var(--nr-linen-mid);display:flex;align-items:center;justify-content:space-between;padding:14px 48px;gap:16px}
  .logo{display:flex;align-items:center;gap:10px;flex-shrink:0}
  .logo-mark{width:34px;height:34px;border-radius:8px;background:var(--nr-dark);display:flex;align-items:center;justify-content:center}
  .logo-mark i{font-size:18px;color:var(--nr-teal-light)}
  .logo-name .l1{font-size:15px;font-weight:600;color:var(--nr-dark)}
  .logo-name .l2{font-size:12px;color:var(--nr-teal)}
  .nav-links{display:flex;gap:24px}
  .nav-links a{font-size:14px;color:var(--nr-muted);transition:color .15s}
  .nav-links a:hover{color:var(--nr-teal)}
  .nav-links a.active{color:var(--nr-teal);font-weight:600;border-bottom:2px solid var(--nr-teal);padding-bottom:2px}
  .nav-right{display:flex;gap:10px;align-items:center;flex-shrink:0}
  .btn{padding:8px 18px;border-radius:var(--radius-sm);font-size:13px;font-weight:500;cursor:pointer;border:1px solid var(--nr-linen-mid);background:#fff;color:var(--nr-dark);font-family:inherit;transition:all .15s}
  .btn:hover{background:var(--nr-linen)}
  .btn-p{background:var(--nr-teal);color:#fff;border-color:var(--nr-teal)}
  .btn-p:hover{background:var(--nr-teal-mid)}
  .btn-lg{padding:12px 26px;font-size:15px;border-radius:var(--radius)}
  .btn-outline{border-color:var(--nr-teal);color:var(--nr-teal);background:transparent}
  .btn-outline:hover{background:var(--nr-teal-light)}

  /* LANG */
  .lang-switcher{display:flex;align-items:center;gap:2px;background:var(--nr-linen);border-radius:var(--radius-full);padding:3px;border:1px solid var(--nr-linen-mid)}
  .lang-btn{padding:4px 12px;border-radius:var(--radius-full);font-size:12px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--nr-muted);font-family:inherit;transition:all .15s;display:flex;align-items:center;gap:5px}
  .lang-btn.active{background:#fff;color:var(--nr-dark);box-shadow:0 1px 3px rgba(0,0,0,.1)}
  .lang-divider{width:1px;height:20px;background:var(--nr-linen-mid);margin:0 4px}
  .script-sub{display:flex;gap:4px;margin-left:4px}
  .script-btn{padding:3px 8px;border-radius:var(--radius-full);font-size:11px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--nr-muted);font-family:inherit;transition:all .15s}
  .script-btn.active{background:var(--nr-teal-light);color:var(--nr-teal)}

  /* HERO */
  .hero{background:var(--nr-linen);padding:56px 48px 44px;border-bottom:1px solid var(--nr-linen-mid)}
  .eyebrow-pill{display:inline-flex;align-items:center;gap:6px;padding:5px 14px;border-radius:var(--radius-full);background:var(--nr-teal-light);color:var(--nr-teal);font-size:12px;font-weight:500;margin-bottom:18px;border:1px solid #A8D8D0}
  .hero h1{font-size:34px;font-weight:600;color:var(--nr-dark);margin-bottom:12px;line-height:1.2}
  .hero h1 span{color:var(--nr-teal)}
  .hero p{font-size:15px;color:var(--nr-muted);max-width:520px;line-height:1.75;margin-bottom:28px}
  .hero-actions{display:flex;gap:12px;flex-wrap:wrap}

  /* FILTER BAR */
  .filter-bar{padding:20px 48px;border-bottom:1px solid var(--nr-linen-mid);background:#fff;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .filter-group{display:flex;gap:8px;flex-wrap:wrap;flex:1}
  .filter-select{padding:8px 14px;border-radius:var(--radius-sm);border:1px solid var(--nr-linen-mid);background:#fff;font-size:13px;color:var(--nr-dark);font-family:inherit;cursor:pointer;outline:none}
  .filter-select:focus{border-color:var(--nr-teal)}
  .search-input{padding:8px 14px;border-radius:var(--radius-sm);border:1px solid var(--nr-linen-mid);font-size:13px;font-family:inherit;outline:none;min-width:200px;flex:1}
  .search-input:focus{border-color:var(--nr-teal)}
  .results-count{font-size:13px;color:var(--nr-muted);white-space:nowrap}

  /* LISTINGS */
  .listings-wrap{padding:36px 48px}
  .listings-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
  .car-card{background:#fff;border:1px solid var(--nr-linen-mid);border-radius:var(--radius);overflow:hidden;transition:border-color .15s,box-shadow .15s;cursor:pointer}
  .car-card:hover{border-color:#A8D8D0;box-shadow:0 4px 16px rgba(61,43,31,.08)}
  .car-img{height:160px;background:var(--nr-linen);display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
  .car-img i{font-size:56px;color:var(--nr-linen-mid)}
  .car-img.suv{background:#E8F4F0}
  .car-img.truck{background:#EEF0E8}
  .car-img.van{background:#EEE8F0}
  .car-img.sedan{background:#E8EEF4}
  .car-img.suv i{color:#2D7A6B}
  .car-img.truck i{color:#6B8C1F}
  .car-img.van i{color:#6B4C8C}
  .car-img.sedan i{color:#1F5A7A}
  .car-badges{position:absolute;top:10px;left:10px;display:flex;gap:6px;flex-wrap:wrap}
  .car-badge{padding:3px 9px;border-radius:var(--radius-full);font-size:11px;font-weight:600}
  .badge-fleet{background:#E0F2EE;color:#2D7A6B}
  .badge-private{background:#F0EDE6;color:#6B4C38}
  .badge-new{background:#FEF9C3;color:#92400E}
  .car-body{padding:16px}
  .car-year{font-size:12px;color:var(--nr-muted);margin-bottom:3px}
  .car-title{font-size:15px;font-weight:600;color:var(--nr-dark);margin-bottom:6px}
  .car-meta{display:flex;gap:12px;margin-bottom:12px;flex-wrap:wrap}
  .car-meta-item{display:flex;align-items:center;gap:4px;font-size:12px;color:var(--nr-muted)}
  .car-meta-item i{font-size:14px;color:var(--nr-teal)}
  .car-footer{display:flex;align-items:center;justify-content:space-between;padding-top:12px;border-top:1px solid var(--nr-linen-mid)}
  .car-price{font-size:20px;font-weight:700;color:var(--nr-dark)}
  .car-contact{padding:6px 14px;border-radius:var(--radius-sm);background:var(--nr-teal);color:#fff;font-size:12px;font-weight:600;border:none;cursor:pointer;font-family:inherit;transition:background .15s}
  .car-contact:hover{background:var(--nr-teal-mid)}
  .car-location{font-size:12px;color:var(--nr-muted);display:flex;align-items:center;gap:3px;margin-top:4px}
  .car-location i{font-size:13px;color:var(--nr-teal)}
  .empty-state{text-align:center;padding:64px 24px;color:var(--nr-muted)}
  .empty-state i{font-size:48px;color:var(--nr-linen-mid);margin-bottom:16px;display:block}

  /* SECTION */
  .section{padding:56px 48px}
  .section.tint{background:var(--nr-linen)}
  .sec-eyebrow{font-size:12px;font-weight:600;color:var(--nr-teal);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
  .section h2{font-size:26px;font-weight:600;color:var(--nr-dark);margin-bottom:10px}
  .section-sub{font-size:15px;color:var(--nr-muted);max-width:520px;line-height:1.7;margin-bottom:32px}
  .divider{height:1px;background:var(--nr-linen-mid)}

  /* HOW IT WORKS SELL */
  .sell-steps{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border:1px solid var(--nr-linen-mid);border-radius:var(--radius);overflow:hidden;background:#fff}
  .sell-step{padding:24px;border-right:1px solid var(--nr-linen-mid)}
  .sell-step:last-child{border-right:none}
  .step-n{width:32px;height:32px;border-radius:50%;background:var(--nr-teal);color:#fff;font-size:14px;font-weight:600;display:flex;align-items:center;justify-content:center;margin-bottom:14px}
  .sell-step h3{font-size:14px;font-weight:600;color:var(--nr-dark);margin-bottom:6px}
  .sell-step p{font-size:13px;color:var(--nr-muted);line-height:1.6}

  /* LISTING FORM */
  .form-wrap{background:#fff;border:1px solid var(--nr-linen-mid);border-radius:var(--radius);padding:36px;max-width:760px}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .form-group{display:flex;flex-direction:column;gap:6px}
  .form-group.full{grid-column:1/-1}
  .form-group label{font-size:13px;font-weight:500;color:var(--nr-dark)}
  .form-group label span{color:#C0504D;margin-left:2px}
  .form-control{padding:10px 14px;border-radius:var(--radius-sm);border:1px solid var(--nr-linen-mid);font-size:14px;font-family:inherit;color:var(--nr-dark);outline:none;transition:border-color .15s;background:#fff}
  .form-control:focus{border-color:var(--nr-teal)}
  .form-control::placeholder{color:var(--nr-muted)}
  textarea.form-control{resize:vertical;min-height:100px}
  .form-hint{font-size:12px;color:var(--nr-muted)}
  .form-section-label{font-size:12px;font-weight:600;color:var(--nr-teal);text-transform:uppercase;letter-spacing:.06em;grid-column:1/-1;margin-top:8px;padding-top:16px;border-top:1px solid var(--nr-linen-mid)}
  .form-check{display:flex;align-items:flex-start;gap:10px;font-size:13px;color:var(--nr-muted);line-height:1.5;grid-column:1/-1}
  .form-check input{margin-top:2px;accent-color:var(--nr-teal);flex-shrink:0}
  .form-footer{display:flex;align-items:center;gap:16px;margin-top:24px;padding-top:20px;border-top:1px solid var(--nr-linen-mid);grid-column:1/-1}
  .form-note{font-size:12px;color:var(--nr-muted);line-height:1.5;flex:1}
  .form-note i{color:var(--nr-teal);margin-right:4px}
  .success-msg{display:none;background:var(--nr-teal-light);border:1px solid #A8D8D0;border-radius:var(--radius-sm);padding:16px 20px;font-size:14px;color:var(--nr-teal);margin-top:20px;align-items:center;gap:10px}
  .success-msg i{font-size:20px;flex-shrink:0}

  /* CTA */
  .cta-band{background:var(--nr-dark);padding:56px 48px;display:flex;align-items:center;justify-content:space-between;gap:32px}
  .cta-band h2{font-size:26px;font-weight:600;color:#fff;margin-bottom:10px}
  .cta-band p{font-size:15px;color:#A08878;line-height:1.7;max-width:420px}
  .cta-btns{display:flex;gap:12px;flex-shrink:0}
  .btn-cta{background:var(--nr-teal);color:#fff;border:none;padding:13px 26px;border-radius:var(--radius);font-size:15px;font-weight:600;cursor:pointer;white-space:nowrap;font-family:inherit;transition:background .15s}
  .btn-cta:hover{background:var(--nr-teal-mid)}
  .btn-ghost{background:transparent;color:#C4B5AC;border:1px solid #5A3E30;padding:13px 26px;border-radius:var(--radius);font-size:15px;cursor:pointer;white-space:nowrap;font-family:inherit}
  .btn-ghost:hover{background:#5A3E30;color:#fff}

  /* FOOTER */
  footer{background:var(--nr-linen);border-top:1px solid var(--nr-linen-mid);padding:48px 48px 0}
  .footer-grid{display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:32px;padding-bottom:40px}
  .footer-brand p{font-size:13px;color:var(--nr-muted);margin-top:12px;line-height:1.7;max-width:220px}
  .footer-col h4{font-size:13px;font-weight:600;color:var(--nr-dark);margin-bottom:14px}
  .footer-col a{display:block;font-size:13px;color:var(--nr-muted);margin-bottom:8px;transition:color .15s}
  .footer-col a:hover{color:var(--nr-teal)}
  .footer-bottom{border-top:1px solid var(--nr-linen-mid);padding:18px 0;display:flex;justify-content:space-between;font-size:12px;color:var(--nr-muted)}

  /* MODAL */
  .modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:200;align-items:center;justify-content:center;padding:20px}
  .modal-overlay.open{display:flex}
  .modal{background:#fff;border-radius:14px;padding:32px;max-width:560px;width:100%;max-height:90vh;overflow-y:auto;position:relative}
  .modal-close{position:absolute;top:16px;right:16px;background:var(--nr-linen);border:none;border-radius:50%;width:32px;height:32px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--nr-muted)}
  .modal-close:hover{background:var(--nr-linen-mid)}
  .modal h3{font-size:20px;font-weight:600;color:var(--nr-dark);margin-bottom:4px}
  .modal-sub{font-size:13px;color:var(--nr-muted);margin-bottom:20px}
  .modal-specs{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
  .modal-spec{background:var(--nr-linen);border-radius:var(--radius-sm);padding:10px 14px}
  .modal-spec-label{font-size:11px;color:var(--nr-muted);margin-bottom:2px}
  .modal-spec-val{font-size:14px;font-weight:600;color:var(--nr-dark)}
  .modal-desc{font-size:13px;color:var(--nr-muted);line-height:1.7;margin-bottom:20px}
  .modal-price{font-size:28px;font-weight:700;color:var(--nr-dark);margin-bottom:20px}
  .modal-actions{display:flex;gap:10px}

  @media(max-width:900px){
    nav{padding:14px 20px}.nav-links{display:none}
    .hero,.listings-wrap,.section,.cta-band{padding-left:20px;padding-right:20px}
    .filter-bar{padding:16px 20px}
    .listings-grid{grid-template-columns:1fr}
    .sell-steps{grid-template-columns:1fr 1fr}
    .form-grid{grid-template-columns:1fr}
    .form-group.full{grid-column:1}
    .footer-grid{grid-template-columns:1fr 1fr}
    .cta-band{flex-direction:column;text-align:center}
    .cta-btns{justify-content:center}
  }
</style>
</head>

let lang='en', script='sc', filtered=[...LISTINGS], modalCar=null;
const d=()=>lang==='en'?CONTENT.en:(script==='tc'?CONTENT.tc:CONTENT.sc);

function setLang(l){
  lang=l;
  document.getElementById('btn-en').classList.toggle('active',l==='en');
  document.getElementById('btn-zh').classList.toggle('active',l==='zh');
  document.getElementById('script-sub').style.display=l==='zh'?'flex':'none';
  document.body.className=l==='en'?'':(script==='tc'?'tc':'sc');
  render();
}
function setScript(s){
  script=s;
  document.getElementById('btn-sc').classList.toggle('active',s==='sc');
  document.getElementById('btn-tc').classList.toggle('active',s==='tc');
  document.body.className=s==='tc'?'tc':'sc';
  render();
}

function render(){
  const c=d();
  // nav
  document.getElementById('nav-links').innerHTML=c.nav.links.map((l,i)=>`<a href="${i===3?'#':'index.html'}" class="${i===3?'active':''}">${l}</a>`).join('');
  document.getElementById('nav-signin').textContent=c.nav.signin;
  document.getElementById('nav-cta').textContent=c.nav.cta;
  // hero
  document.getElementById('hero-eyebrow').textContent=c.hero.eyebrow;
  document.getElementById('hero-h1').innerHTML=c.hero.h1;
  document.getElementById('hero-p').textContent=c.hero.p;
  document.getElementById('hero-cta1').textContent=c.hero.cta1;
  document.getElementById('hero-cta2').textContent=c.hero.cta2;
  // filter
  document.getElementById('search-input').placeholder=c.filter.search;
  const typeOpt=document.getElementById('filter-type');
  typeOpt.options[0].text=c.filter.allTypes;
  const sellerOpt=document.getElementById('filter-seller');
  sellerOpt.options[0].text=c.filter.allSellers;
  sellerOpt.options[1].text=c.filter.fleet;
  sellerOpt.options[2].text=c.filter.private;
  // how
  document.getElementById('how-eyebrow').textContent=c.how.eyebrow;
  document.getElementById('how-h2').textContent=c.how.h2;
  document.getElementById('how-sub').textContent=c.how.sub;
  document.getElementById('sell-steps').innerHTML=c.how.steps.map(s=>`<div class="sell-step"><div class="step-n">${s.n}</div><h3>${s.title}</h3><p>${s.body}</p></div>`).join('');
  // form
  document.getElementById('form-eyebrow').textContent=c.form.eyebrow;
  document.getElementById('form-h2').textContent=c.form.h2;
  document.getElementById('form-sub').textContent=c.form.sub;
  renderForm(c);
  // cta
  document.getElementById('cta-h2').textContent=c.cta.h2;
  document.getElementById('cta-p').textContent=c.cta.p;
  document.getElementById('cta-btn1').textContent=c.cta.btn1;
  document.getElementById('cta-btn2').textContent=c.cta.btn2;
  // footer
  document.getElementById('footer-tag').textContent=c.footer.tag;
  const fcols=document.querySelectorAll('.footer-col');
  c.footer.cols.forEach((col,i)=>{
    if(!fcols[i])return;
    fcols[i].querySelector('h4').textContent=col.h;
    fcols[i].querySelectorAll('a').forEach((a,j)=>{if(col.links[j])a.textContent=col.links[j];});
  });
  document.getElementById('footer-copy').textContent=c.footer.copy;
  document.getElementById('footer-legal').textContent=c.footer.legal;
  renderListings();
}

function renderForm(c){
  const f=c.form.fields;
  const mkOpts=(opts)=>opts.map(o=>`<option>${o}</option>`).join('');
  document.getElementById('listing-form-inner').innerHTML=`
    <div class="form-section-label">${c.form.sections.vehicle}</div>
    <div class="form-group"><label>${f.year}<span>*</span></label><input class="form-control" type="number" placeholder="e.g. 2022" min="2000" max="2026" required></div>
    <div class="form-group"><label>${f.make}<span>*</span></label><input class="form-control" type="text" placeholder="e.g. Ford" required></div>
    <div class="form-group"><label>${f.model}<span>*</span></label><input class="form-control" type="text" placeholder="e.g. F-150" required></div>
    <div class="form-group"><label>${f.trim}</label><input class="form-control" type="text" placeholder="e.g. Raptor 4WD"></div>
    <div class="form-group"><label>${f.mileage}<span>*</span></label><input class="form-control" type="number" placeholder="e.g. 35000" required></div>
    <div class="form-group"><label>${f.price}<span>*</span></label><input class="form-control" type="number" placeholder="e.g. 45000" required></div>
    <div class="form-group"><label>${f.color}</label><input class="form-control" type="text" placeholder="e.g. Oxford White"></div>
    <div class="form-group"><label>${f.engine}</label><input class="form-control" type="text" placeholder="e.g. 3.5L EcoBoost V6"></div>
    <div class="form-group"><label>${f.trans}</label><select class="form-control"><option>Automatic</option><option>Manual</option><option>CVT</option></select></div>
    <div class="form-group"><label>${f.condition}</label><select class="form-control">${mkOpts(f.condOpts)}</select></div>
    <div class="form-group"><label>${f.type}<span>*</span></label><select class="form-control">${mkOpts(f.typeOpts)}</select></div>
    <div class="form-group"><label>${f.sellerType}<span>*</span></label><select class="form-control">${mkOpts(f.sellerOpts)}</select></div>
    <div class="form-section-label">${c.form.sections.seller}</div>
    <div class="form-group"><label>${f.name}<span>*</span></label><input class="form-control" type="text" required></div>
    <div class="form-group"><label>${f.email}<span>*</span></label><input class="form-control" type="email" required></div>
    <div class="form-group"><label>${f.phone}</label><input class="form-control" type="tel"></div>
    <div class="form-group"><label>${f.location}<span>*</span></label><input class="form-control" type="text" placeholder="e.g. Dallas, TX" required></div>
    <div class="form-section-label">${c.form.sections.extra}</div>
    <div class="form-group full"><label>${f.desc}</label><textarea class="form-control" placeholder="${f.descHint}"></textarea></div>
    <div class="form-group full"><label>${f.photos}</label><input class="form-control" type="url" placeholder="https://"><p class="form-hint">${f.photosHint}</p></div>
    <div class="form-check full"><input type="checkbox" id="agree-chk" required><label for="agree-chk">${f.agree}</label></div>
    <div class="form-footer full">
      <p class="form-note"><i class="ti ti-info-circle"></i>${f.note}</p>
      <button type="submit" class="btn btn-p btn-lg">${f.submit}</button>
    </div>`;
}

function renderListings(){
  const c=d();
  const grid=document.getElementById('listings-grid');
  const count=document.getElementById('results-count');
  count.textContent=`${filtered.length} ${c.filter.results}`;
  if(filtered.length===0){
    grid.innerHTML=`<div class="empty-state" style="grid-column:1/-1"><i class="ti ti-car-off"></i><p>${lang==='en'?'No listings match your filters.':lang==='zh'&&script==='tc'?'沒有符合篩選條件的車輛。':'没有符合筛选条件的车辆。'}</p></div>`;
    return;
  }
  grid.innerHTML=filtered.map(car=>`
    <div class="car-card" onclick="openModal(${car.id})">
      <div class="car-img ${car.type}">
        <i class="ti ${car.type==='truck'?'ti-truck':car.type==='van'?'ti-truck-delivery':car.type==='sedan'?'ti-car':'ti-car-suv'}"></i>
        <div class="car-badges">
          <span class="car-badge badge-${car.badge}">${car.badge==='fleet'?c.card.fleet:c.card.private}</span>
          ${car.newListing?`<span class="car-badge badge-new">${c.card.newBadge}</span>`:''}
        </div>
      </div>
      <div class="car-body">
        <div class="car-year">${car.year}</div>
        <div class="car-title">${car.make} ${car.model} ${car.trim}</div>
        <div class="car-meta">
          <div class="car-meta-item"><i class="ti ti-dashboard"></i>${car.miles.toLocaleString()} ${c.card.miles}</div>
          <div class="car-meta-item"><i class="ti ti-color-swatch"></i>${car.color}</div>
        </div>
        <div class="car-location"><i class="ti ti-map-pin"></i>${car.location}</div>
        <div class="car-footer">
          <div class="car-price">$${car.price.toLocaleString()}</div>
          <button class="car-contact" onclick="event.stopPropagation();openModal(${car.id})">${c.card.contact}</button>
        </div>
      </div>
    </div>`).join('');
}

function applyFilters(){
  const search=document.getElementById('search-input').value.toLowerCase();
  const type=document.getElementById('filter-type').value;
  const seller=document.getElementById('filter-seller').value;
  const sort=document.getElementById('filter-sort').value;
  filtered=LISTINGS.filter(c=>{
    const matchSearch=!search||(c.make+' '+c.model+' '+c.trim).toLowerCase().includes(search);
    const matchType=!type||c.type===type;
    const matchSeller=!seller||c.seller===seller;
    return matchSearch&&matchType&&matchSeller;
  });
  if(sort==='price-asc')filtered.sort((a,b)=>a.price-b.price);
  else if(sort==='price-desc')filtered.sort((a,b)=>b.price-a.price);
  else if(sort==='miles')filtered.sort((a,b)=>a.miles-b.miles);
  else filtered.sort((a,b)=>b.id-a.id);
  renderListings();
}

function openModal(id){
  const car=LISTINGS.find(c=>c.id===id);
  if(!car)return;
  const c=d();
  const m=c.modal;
  document.getElementById('modal-img').className=`car-img ${car.type}`;
  document.getElementById('modal-img').innerHTML=`<i class="ti ${car.type==='truck'?'ti-truck':car.type==='van'?'ti-truck-delivery':car.type==='sedan'?'ti-car':'ti-car-suv'}" style="font-size:72px"></i>`;
  document.getElementById('modal-title').textContent=`${car.make} ${car.model} ${car.trim}`;
  document.getElementById('modal-sub').textContent=`${car.year} · ${car.location}`;
  document.getElementById('modal-price').textContent=`$${car.price.toLocaleString()}`;
  document.getElementById('modal-desc').textContent=car.desc;
  document.getElementById('modal-specs').innerHTML=`
    <div class="modal-spec"><div class="modal-spec-label">${m.mileage}</div><div class="modal-spec-val">${car.miles.toLocaleString()} ${c.card.miles}</div></div>
    <div class="modal-spec"><div class="modal-spec-label">${m.color}</div><div class="modal-spec-val">${car.color}</div></div>
    <div class="modal-spec"><div class="modal-spec-label">${m.engine}</div><div class="modal-spec-val">${car.engine}</div></div>
    <div class="modal-spec"><div class="modal-spec-label">${m.transmission}</div><div class="modal-spec-val">${car.trans}</div></div>
    <div class="modal-spec"><div class="modal-spec-label">${m.seller}</div><div class="modal-spec-val">${car.seller==='fleet'?m.fleetLabel:m.privateLabel}</div></div>
    <div class="modal-spec"><div class="modal-spec-label">${m.condition}</div><div class="modal-spec-val">${m.used}</div></div>`;
  document.getElementById('modal-inquire').textContent=m.inquire;
  document.getElementById('modal-close-btn').textContent=m.close;
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow='hidden';
}
function closeModal(){
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow='';
}

function handleFormSubmit(e){
  e.preventDefault();
  const chk=document.getElementById('agree-chk');
  if(!chk||!chk.checked){alert(lang==='en'?'Please confirm the checkbox.':'请勾选确认框。');return;}
  document.getElementById('success-msg').style.display='flex';
  e.target.reset();
  document.getElementById('success-msg').scrollIntoView({behavior:'smooth',block:'nearest'});
}

window.addEventListener('DOMContentLoaded',()=>{
  render();
  document.getElementById('search-input').addEventListener('input',applyFilters);
  document.getElementById('filter-type').addEventListener('change',applyFilters);
  document.getElementById('filter-seller').addEventListener('change',applyFilters);
  document.getElementById('filter-sort').addEventListener('change',applyFilters);
  document.getElementById('listing-form').addEventListener('submit',handleFormSubmit);
  document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target===document.getElementById('modal-overlay'))closeModal();});
});

<section class="hero">
  <div class="eyebrow-pill"><i class="ti ti-building-store"></i> <span id="hero-eyebrow"></span></div>
  <h1 id="hero-h1"></h1>
  <p id="hero-p"></p>
  <div class="hero-actions">
    <button class="btn btn-p btn-lg" id="hero-cta1" onclick="document.getElementById('list-form').scrollIntoView({behavior:'smooth'})"></button>
    <button class="btn btn-outline btn-lg" id="hero-cta2" onclick="document.getElementById('listings-wrap').scrollIntoView({behavior:'smooth'})"></button>
  </div>
</section>

<!-- FILTER BAR -->
<div class="filter-bar">
  <div class="filter-group">
    <input class="search-input" type="text" id="search-input"/>
    <select class="filter-select" id="filter-type">
      <option value="">All types</option>
      <option value="suv">SUV</option>
      <option value="truck">Truck</option>
      <option value="van">Van</option>
      <option value="sedan">Sedan</option>
    </select>
    <select class="filter-select" id="filter-seller">
      <option value="">All sellers</option>
      <option value="fleet">Fleet operator</option>
      <option value="private">Private seller</option>
    </select>
    <select class="filter-select" id="filter-sort">
      <option value="newest">Newest first</option>
      <option value="price-asc">Price: Low to High</option>
      <option value="price-desc">Price: High to Low</option>
      <option value="miles">Lowest miles</option>
    </select>
  </div>
  <span class="results-count" id="results-count"></span>
</div>

<!-- LISTINGS -->
<div class="listings-wrap" id="listings-wrap">
  <div class="listings-grid" id="listings-grid"></div>
</div>

<div class="divider"></div>

<!-- HOW IT WORKS FOR SELLERS -->
<section class="section tint">
  <div class="sec-eyebrow" id="how-eyebrow"></div>
  <h2 id="how-h2"></h2>
  <p class="section-sub" id="how-sub"></p>
  <div class="sell-steps" id="sell-steps"></div>
</section>

<div class="divider"></div>

<!-- LISTING FORM -->
<section class="section" id="list-form">
  <div class="sec-eyebrow" id="form-eyebrow"></div>
  <h2 id="form-h2"></h2>
  <p class="section-sub" id="form-sub"></p>
  <div class="form-wrap">
    <form id="listing-form" novalidate>
      <div class="form-grid" id="listing-form-inner"></div>
    </form>
    <div class="success-msg" id="success-msg">
      <i class="ti ti-circle-check"></i>
      <span id="success-text"></span>
    </div>
  </div>
</section>

<!-- CTA -->
<div class="cta-band">
  <div>
    <h2 id="cta-h2"></h2>
    <p id="cta-p"></p>
  </div>
  <div class="cta-btns">
    <button class="btn-cta" id="cta-btn1" onclick="window.location.href='index.html#pricing'"></button>
    <button class="btn-ghost" id="cta-btn2" onclick="window.location.href='index.html#contact'"></button>
  </div>
</div>

<!-- FOOTER -->
<footer>
  <div class="footer-grid">
    <div class="footer-brand">
      <a class="logo" href="index.html">
        <div class="logo-mark"><i class="ti ti-tree"></i></div>
        <div class="logo-name"><div class="l1">New Roots</div><div class="l2">Solution</div></div>
      </a>
      <p id="footer-tag"></p>
    </div>
    <div class="footer-col"><h4></h4><a href="#"></a><a href="#"></a><a href="#"></a><a href="#"></a></div>
    <div class="footer-col"><h4></h4><a href="#"></a><a href="#"></a><a href="#"></a><a href="#"></a></div>
    <div class="footer-col"><h4></h4><a href="#"></a><a href="#"></a><a href="#"></a></div>
  </div>
  <div class="footer-bottom">
    <span id="footer-copy"></span><span id="footer-legal"></span>
  </div>
</footer>

<!-- VEHICLE DETAIL MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modal-img" style="height:200px;border-radius:8px;margin-bottom:20px;overflow:hidden"></div>
    <h3 id="modal-title"></h3>
    <div class="modal-sub" id="modal-sub"></div>
    <div class="modal-price" id="modal-price"></div>
    <div class="modal-specs" id="modal-specs"></div>
    <p class="modal-desc" id="modal-desc"></p>
    <div class="modal-actions">
      <button class="btn btn-p btn-lg" id="modal-inquire" onclick="closeModal();document.getElementById('list-form').scrollIntoView({behavior:'smooth'})"></button>
      <button class="btn btn-lg" id="modal-close-btn" onclick="closeModal()"></button>
    </div>
  </div>
</div>
</body>
</html>
